services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hecos
      POSTGRES_USER: hecos
      POSTGRES_PASSWORD: hecos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./apps/api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hecos
      DB_USER: hecos
      DB_PASSWORD: hecos
    depends_on:
      - db

volumes:
  postgres_data:
