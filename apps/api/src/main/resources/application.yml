spring:
  application:
    name: hecos-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hecos}
    username: ${DB_USER:hecos}
    password: ${DB_PASSWORD:hecos}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

app:
  jwt:
    secret: ${JWT_SECRET:hecos-dev-secret-key-change-in-production-min-32-chars}
    expiration-ms: 86400000
